# Codemagic configuration for Stash App
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Set up dependencies
        script: flutter pub get
      - name: Build iOS (No Sign)
        script: |
          # Build for simulator first (easiest to get artifact)
          flutter build ios --simulator --debug
          # Try to build for device (might fail at signing but we capture the .app)
          flutter build ios --debug --no-codesign || true
    artifacts:
      - build/ios/iphonesimulator/*.app
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    scripts:
      - name: Set up dependencies
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
