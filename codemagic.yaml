# Codemagic configuration for Stash App
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Set up dependencies
        script: flutter pub get
      - name: Build iOS
        script: |
          # Build for simulator
          flutter build ios --simulator --debug
          # Build for device (no sign)
          flutter build ios --debug --no-codesign || true
      - name: Post-build Zip
        script: |
          mkdir -p final_builds
          zip -r final_builds/ios_simulator.zip build/ios/iphonesimulator/*.app || true
          zip -r final_builds/ios_device.zip build/ios/iphoneos/*.app || true
    artifacts:
      - final_builds/*.zip
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    scripts:
      - name: Set up dependencies
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
