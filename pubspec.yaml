name: stash_app
description: A modern local-first app for saving notes, videos, and links.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management and DB
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  intl: ^0.18.1

  # UI / Cards / Swiper
  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.1
  receive_sharing_intent: ^1.5.0
  share_plus: ^13.1.0
  file_picker: ^11.0.0
  image_picker: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

dependency_overrides:
  win32: ^6.1.0
  web: ^1.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
