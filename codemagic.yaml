# Codemagic configuration for Stash App
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up dependencies
        script: |
          flutter pub get
      - name: Build iOS
        script: |
          # This builds the .ipa for distribution (Ad Hoc or App Store)
          # Note: This requires signing certificates to be uploaded to Codemagic UI
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
